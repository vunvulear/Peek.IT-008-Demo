schema_version: '1.0'
extension:
  id: 'security-review'
  name: 'Security Review'
  version: '1.1.0'
  description: 'Comprehensive security audit of codebases using AI-powered DevSecOps analysis'
  author: 'Spec-Kit Security Team'
  repository: 'https://github.com/DyanGalih/spec-kit-security-review'
  license: 'MIT'
  homepage: 'https://github.com/DyanGalih/spec-kit-security-review'
requires:
  speckit_version: '>=0.1.0'
provides:
  commands:
    - name: 'speckit.security-review.audit'
      file: 'prompts/security-review.prompt.md'
      description: 'Perform comprehensive security audit of the entire codebase'
    - name: 'speckit.security-review.staged'
      file: 'prompts/security-review-staged.prompt.md'
      description: 'Security review of staged changes only (git diff --cached)'
    - name: 'speckit.security-review.branch'
      file: 'prompts/security-review-branch.prompt.md'
      description: 'Security review of changes on a branch compared to a base branch'
tags:
  - 'security'
  - 'devsecops'
  - 'audit'
  - 'owasp'
  - 'compliance'
